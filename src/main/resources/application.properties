spring.application.name=gateway

server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# ========== RUTAS A MICROSERVICIOS ==========
spring.cloud.gateway.server.webflux.routes[0].id=usuarios
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webflux.routes[1].id=catalogo
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ms-catalogo
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/productos/**,/api/categorias/**

spring.cloud.gateway.server.webflux.routes[2].id=inventario
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ms-inventario
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/stock/**,/api/almacenes/**

spring.cloud.gateway.server.webflux.routes[3].id=carrito
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ms-carrito
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/carrito/**

spring.cloud.gateway.server.webflux.routes[4].id=pedido
spring.cloud.gateway.server.webflux.routes[4].uri=lb://ms-pedido
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/pedidos/**

spring.cloud.gateway.server.webflux.routes[5].id=pago
spring.cloud.gateway.server.webflux.routes[5].uri=lb://ms-pago
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/pagos/**

spring.cloud.gateway.server.webflux.routes[6].id=resenas
spring.cloud.gateway.server.webflux.routes[6].uri=lb://ms-resenas
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/resenas/**

spring.cloud.gateway.server.webflux.routes[7].id=storage
spring.cloud.gateway.server.webflux.routes[7].uri=lb://ms-storage
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/archivos/**

